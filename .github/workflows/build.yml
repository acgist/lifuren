name: build

on:
  push:
    branches: [ master ]

jobs:
  lifuren:
    name: Build lifuren
    strategy:
      matrix:
        runs-on: [ macos-latest, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Checkout deps
      run: |
        git submodule update --init --recursive
        cd ./deps/glog
        # git clone https://github.com/google/glog.git
        cd ../glog
        git checkout v0.6.0
    - name: Build xx glog
      if: runner.os != 'windows'
      run: |
        cd ./xx/glog
        mkdir build
        cd build
        cmake ..
        make
        make clean
    - name: Build xx glog
      if: runner.os == 'windows'
      run: |
        cd ./xx/glog
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" ..
        make
        make clean
    - name: Build xx template
      if: runner.os != 'windows'
      run: |
        cd ./xx/template
        mkdir build
        cd build
        cmake ..
        make
        make clean
    - name: Build xx template
      if: runner.os == 'windows'
      run: |
        cd ./xx/template
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" ..
        make
        make clean
