name: build
on:
  push:
    branches: [ master ]
jobs:
  lifuren:
    name: Build lifuren
    # https://docs.github.com/zh/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Checkout deps
        run: |
          git submodule update --init --recursive
          cd ./deps
          ################################ ffmpeg
          sudo  apt install ffmpeg -y
          apt-cache madison ffmpeg
          ################################ opencv
          sudo  apt install libopencv-dev -y
          apt-cache madison libopencv-dev
          ################################ spdlog
          # sudo  apt install libspdlog-dev -y
          # apt-cache madison libspdlog-dev
          git clone -b 10.2.0 --depth=1 https://github.com/fmtlib/fmt.git
          cd fmt
          mkdir build ; cd $_
          cmake .. -DFMT_TEST=OFF -DBUILD_SHARED_LIBS=ON
          make -j 2
          sudo make install
          cd ../../
          git clone -b v1.13.0 --depth=1 https://github.com/gabime/spdlog.git
          cd spdlog
          mkdir build ; cd $_
          cmake .. -DSPDLOG_BUILD_EXAMPLE=OFF -DBUILD_SHARED_LIBS=ON
          make -j 2
          sudo make install
          cd ../../
          ################################ libtorch
          wget  https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.6.0%2Bcpu.zip > /dev/null 2>&1
          unzip libtorch-cxx11-abi-shared-with-deps-2.6.0+cpu.zip > /dev/null 2>&1
          ################################ yaml-cpp
          sudo  apt install libyaml-cpp-dev -y
          apt-cache madison libyaml-cpp-dev
          ################################ tinyxml2
          sudo  apt install libtinyxml2-dev -y
          apt-cache madison libtinyxml2-dev
          ################################ wxWidgets
          # sudo  apt install libwxgtk3.0-gtk3-dev -y
          # apt-cache madison libwxgtk3.0-gtk3-dev
          sudo  apt install libgtk2.0-dev -y
          apt-cache madison libgtk2.0-dev
          git clone -b v3.2.4 --depth=1 https://github.com/wxWidgets/wxWidgets.git
          cd wxWidgets
          git submodule update --init src/tiff
          git submodule update --init 3rdparty/pcre
          # ./configure --disable-shared --enable-unicode --enable-webview --enable-webviewedge
          ./configure --disable-shared --enable-unicode --enable-webview --enable-webviewwebkit
          cd ..
      - name: Deploy lifuren
        run: |
          gcc -v
          g++ -v
          cmake -version
          mkdir build ; cd $_
          cmake ..
          make
          # make -j 2
          ls -lh Debug/bin
          ls -lh Debug/lib
          sudo make install
          make clean
