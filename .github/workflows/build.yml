name: build
on:
  push:
    branches: [ master ]
jobs:
  lifuren:
    name: Build lifuren
    # https://docs.github.com/zh/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Checkout deps
        run: |
          git submodule update --init --recursive
          cd ./deps
          ################################ fltk
          sudo  apt install libfltk1.3-dev -y > /dev/null 2>&1
          apt-cache madison libfltk1.3-dev
          ################################ json
          cd ./json
          git switch -c v3.11.2
          cd ../
          ################################ faiss
          sudo  apt install libfaiss-dev -y > /dev/null 2>&1
          apt-cache madison libfaiss-dev
          ################################ ffmpeg
          sudo  apt install ffmpeg -y > /dev/null 2>&1
          apt-cache madison ffmpeg
          ################################ spdlog
          # sudo  apt install libspdlog-dev -y > /dev/null 2>&1
          # apt-cache madison libspdlog-dev
          # fmt
          git clone https://github.com/fmtlib/fmt.git
          cd fmt
          git switch -c 10.2.0
          mkdir build ; cd $_
          cmake .. -DFMT_TEST=OFF
          make -j > /dev/null 2>&1
          sudo make install > /dev/null 2>&1
          cd ../../
          # spdlog
          git clone https://github.com/gabime/spdlog.git
          cd spdlog
          git switch -c v1.12.0
          mkdir build ; cd $_
          cmake .. -DSPDLOG_BUILD_EXAMPLE=OFF
          make -j > /dev/null 2>&1
          sudo make install > /dev/null 2>&1
          cd ../../
          ################################ opencv
          sudo  apt install libopencv-dev -y > /dev/null 2>&1
          apt-cache madison libopencv-dev
          ################################ libtorch
          wget  https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.4.1%2Bcpu.zip > /dev/null 2>&1
          unzip libtorch-cxx11-abi-shared-with-deps-2.4.1+cpu.zip > /dev/null 2>&1
          ################################ yaml-cpp
          sudo  apt install libyaml-cpp-dev -y > /dev/null 2>&1
          apt-cache madison libyaml-cpp-dev
          ################################ cpp-httplib
          # sudo  apt install libcpp-httplib-dev -y > /dev/null 2>&1
          # apt-cache madison libcpp-httplib-dev
          # cpp-httplib
          git clone https://github.com/yhirose/cpp-httplib.git
          cd cpp-httplib
          git switch -c v0.16.2
          mkdir build ; cd $_
          cmake ..
          make -j > /dev/null 2>&1
          sudo make install > /dev/null 2>&1
          cd ../../
      - name: Deploy lifuren
        run: |
          pwd
          gcc -v
          g++ -v
          cmake -version
          mkdir build ; cd $_
          cmake ..
          make -j
          ls -lh Debug/bin
          ls -lh Debug/lib
          sudo make install
          make clean
