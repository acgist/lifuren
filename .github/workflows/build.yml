name: build
on:
  push:
    branches: [ master ]
jobs:
  lifuren:
    name: Build lifuren
    # https://docs.github.com/zh/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Checkout deps
        run: |
          git submodule update --init --recursive
          cd ./deps
          ################################ fltk
          sudo  apt install libfltk1.3-dev -y
          apt-cache madison libfltk1.3-dev
          ################################ json
          cd ./json
          git switch -c v3.11.2
          cd ../
          ################################ ffmpeg
          sudo  apt install ffmpeg -y
          apt-cache madison ffmpeg
          ################################ spdlog
          # sudo  apt install libspdlog-dev -y
          # apt-cache madison libspdlog-dev
          git clone https://github.com/fmtlib/fmt.git
          cd fmt
          git switch -c 10.2.0
          mkdir build ; cd $_
          cmake .. -DFMT_TEST=OFF -DBUILD_SHARED_LIBS=ON
          make -j 2
          sudo make install
          cd ../../
          git clone https://github.com/gabime/spdlog.git
          cd spdlog
          git switch -c v1.13.0
          mkdir build ; cd $_
          cmake .. -DSPDLOG_BUILD_EXAMPLE=OFF -DBUILD_SHARED_LIBS=ON
          make -j 2
          sudo make install
          cd ../../
          ################################ opencv
          sudo  apt install libopencv-dev -y
          apt-cache madison libopencv-dev
          ################################ libtorch
          wget  https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.6.0%2Bcpu.zip > /dev/null 2>&1
          unzip libtorch-cxx11-abi-shared-with-deps-2.6.0+cpu.zip > /dev/null 2>&1
          ################################ yaml-cpp
          sudo  apt install libyaml-cpp-dev -y
          apt-cache madison libyaml-cpp-dev
      - name: Deploy lifuren
        run: |
          gcc -v
          g++ -v
          cmake -version
          mkdir build ; cd $_
          cmake ..
          make
          # make -j 2
          ls -lh Debug/bin
          ls -lh Debug/lib
          sudo make install
          make clean
