  rhythm: 行香子
  alias: [ "爇心香", "读书引" ]
  title: 行香子·述怀
  example: |
    清夜无尘，月色如银。
    酒斟时、须满十分。
    浮名浮利，虚苦劳神。
    叹隙中驹，石中火，梦中身。
    虽抱文章，开口谁亲。
    且陶陶、乐尽天真。
    几时归去，作个闲人。
    对一张琴，一壶酒，一溪云。
