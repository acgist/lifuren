  alias: [ "古调歌", "云雾敛", "鬓云松令" ]
  title: 苏幕遮·怀旧
  example: |
    碧云天，黄叶地，秋色连波，波上寒烟翠。
    山映斜阳天接水，芳草无情，更在斜阳外。
    黯乡魂，追旅思，夜夜除非，好梦留人睡。
