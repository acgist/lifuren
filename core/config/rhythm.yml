  rhythm: 虞美人
  alias: [ "一江春水", "玉壶水" ]
  title: 虞美人·宜州见梅作
  example: |
    天涯也有江南信。梅破知春近。
    夜阑风细得香迟。不道晓来开遍、向南枝。
    玉台弄粉花应妒。飘到眉心住。
    平生个里愿杯深。去国十年老尽、少年心。
