  alias: [ "玉壶水", "一江春水", "巫山十二峰" ]
  title: 虞美人·春花秋月何时了
  example: |
    春花秋月何时了，往事知多少？
    小楼昨夜又东风，故国不堪回首月明中。
    雕栏玉砌应犹在，只是朱颜改。
    问君能有几多愁？恰似一江春水向东流。
