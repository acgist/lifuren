七言绝句:
  rhythm: 七言绝句
  alias: []
  title: 枫桥夜泊
  example: |
    月落乌啼霜满天，江枫渔火对愁眠。
    姑苏城外寒山寺，夜半钟声到客船。
  fontSize: 28
  segmentSize: 4
  segmentRule: [ 7, 7, 7, 7 ]
  participleRule: [
