五言律诗:
  rhythm: 五言律诗
  alias: []
  title: 春望
  example: |
    国破山河在，城春草木深。
    感时花溅泪，恨别鸟惊心。
    烽火连三月，家书抵万金。
    白头掻更短，浑欲不胜簪。
  fontSize: 40
  segmentSize: 8
  segmentRule: [ 5, 5, 5, 5, 5, 5, 5, 5 ]
  participleRule: [
    2, 3, 2, 3,
    2, 3, 2, 3,
    2, 3, 2, 3,
    2, 3, 2, 3
  ]
七言律诗:
  rhythm: 七言律诗
  alias: []
  title: 登高
  example: |
    风急天高猿啸哀，渚清沙白鸟飞回。
    无边落木萧萧下，不尽长江滚滚来。
    万里悲秋常作客，百年多病独登台。
    艰难苦恨繁霜鬓，潦倒新停浊酒杯。
  fontSize: 56
  segmentSize: 8
  segmentRule: [ 7, 7, 7, 7, 7, 7, 7, 7 ]
  participleRule: [
    2, 2, 3, 2, 2, 3,
    2, 2, 3, 2, 2, 3,
    2, 2, 3, 2, 2, 3,
    2, 2, 3, 2, 2, 3
  ]
虞美人:
  rhythm: 虞美人
  alias: [ "玉壶水", "一江春水", "巫山十二峰" ]
  title: 虞美人·春花秋月何时了
  example: |
    春花秋月何时了，往事知多少？小楼昨夜又东风，故国不堪回首月明中。
    雕栏玉砌应犹在，只是朱颜改。问君能有几多愁？恰似一江春水向东流。
  fontSize: 56
  segmentSize: 8
  segmentRule: [ 7, 5, 7, 9, 7, 5, 7, 9 ]
  participleRule: [
    2, 2, 3, 2, 3, 2, 2, 3, 2, 2, 2, 3,
    2, 2, 3, 2, 3, 2, 2, 3, 2, 2, 2, 3
  ]
蝶恋花:
  rhythm: 蝶恋花
  alias: [ "鹊踏枝", "黄金缕", "卷珠帘", "凤栖梧" ]
  title: 蝶恋花·庭院深深深几许
  example: |
    庭院深深深几许，杨柳堆烟，帘幕无重数。玉勒雕鞍游冶处，楼高不见章台路。
    雨横风狂三月暮，门掩黄昏，无计留春住。泪眼问花花不语，乱红飞过秋千去。
  fontSize: 60
  segmentSize: 10
  segmentRule: [ 7, 4, 5, 7, 7, 7, 4, 5, 7, 7 ]
