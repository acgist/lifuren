# 公共配置
config:
  tmp: D:\tmp
# HTTP监听
rest-server:
  host: 0.0.0.0
  port: 8080
# 音频页面配置
audio:
  path: D:\tmp\lifuren\audio
  model: 
  client: audio-shikuang
  clients:
    - audio-shikuang
# 视频页面配置
video:
  path: D:\tmp\lifuren\video
  model: 
  length: 24
  client: video-wudaozi
  clients:
    - video-wudaozi
# 诗词页面配置
poetry:
  path: D:\tmp\lifuren\poetry
  model: 
  size: 768
  length: 4
  client: poetry-lidu
  clients:
    - poetry-lidu
    - poetry-suxin
  # 返回数量
  rag-size: 4
  # char|rhythm
  embedding-participle: rhythm
# ElasticSearch配置
elasticsearch:
  api: http://192.168.8.183:9200
  username: elastic
  password: elastic
  # NONE|Basic|Token
  auth-type: Basic
# Ollama配置
# https://github.com/ollama/ollama/blob/main/docs/api.md
ollama:
  api: http://192.168.8.228:11434
  dims: 768
  username: 
  password: 
  # NONE|Basic|Token
  auth-type: NONE
  embedding:
    path: /api/embed
    model: quentinz/bge-base-zh-v1.5
    # model: quentinz/bge-large-zh-v1.5
    # model: quentinz/bge-small-zh-v1.5
    options: {}
# pepper配置
pepper:
  dims: 768
  