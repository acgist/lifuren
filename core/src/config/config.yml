# HTTP监听
http-server:
  host: 0.0.0.0
  port: 8080
# 图片页面配置
image:
  client: stable-diffusion-cpp
  output: /data/image
  clients:
    - stable-diffusion-cpp
# 诗词页面配置
poetry:
# 图片标记页面配置
image-mark:
  - path: /data/mark/image
# 诗词标记页面配置
poetry-mark:
  - path: /data/mark/poetry
# RAG
rag:
  type: elasticsearch
  size: 4
# Embedding
embedding:
  type: ollama
# OpenAI配置
openai:
  api:
  username:
  password:
  # NONE|Basic|Token
  auth-type: NONE
  embedding:
    path: /v1/embeddings
    model: 
    options: {}
# Ollama配置
# https://github.com/ollama/ollama/blob/main/docs/api.md
ollama:
  api: http://localhost:11434
  username: 
  password: 
  # NONE|Basic|Token
  auth-type: NONE
  embedding:
    path: /api/embed
    model: quentinz/bge-large-zh-v1.5
    options: {}
# ElasticSearch配置
elasticsearch:
  api: http://localhost:9200
  username: elastic
  password: elastic
  # NONE|Basic|Token
  auth-type: Basic
  # RAG|TEXT
  embedding: TEXT
# Chinese-Word-Vectors配置
Chinese-Word-Vectors:
# stable-diffusion-cpp配置
stable-diffusion-cpp:
  model: /data/stable-diffusion-cpp/model.ckpt
  command: /data/stable-diffusion-cpp/sd
  options: {}
  