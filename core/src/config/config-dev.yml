# HTTP监听
http-server:
  host: 0.0.0.0
  port: 8080
# 图片页面配置
image:
  client: stable-diffusion-cpp
  output: D:\tmp\data\image
  clients:
    - stable-diffusion-cpp
# 诗词页面配置
poetry:
  model: D:\tmp\data\poetry.model
# 图片标记页面配置
image-mark:
  - path: D:\tmp\data\mark\image
# 诗词标记页面配置
poetry-mark:
  - path: D:\tmp\data\mark\poetry
# RAG
rag:
  id: 0
  # elasticsearch
  type: elasticsearch
  size: 8
  # text|ollama|chinese-word-vectors
  embedding: text
# Embedding
embedding:
  # text|ollama|chinese-word-vectors
  type: ollama
# Ollama配置
# https://github.com/ollama/ollama/blob/main/docs/api.md
ollama:
  api: http://192.168.8.228:11434
  username: 
  password: 
  # NONE|Basic|Token
  auth-type: NONE
  embedding:
    path: /api/embed
    model: quentinz/bge-large-zh-v1.5
    options: {}
# ElasticSearch配置
elasticsearch:
  api: http://192.168.8.183:9200
  username: elastic
  password: elastic
  # NONE|Basic|Token
  auth-type: Basic
# chinese-word-vectors配置
chinese-word-vectors:
  path: D:\tmp\Chinese-Word-Vectors\sgns.sikuquanshu.word
# stable-diffusion-cpp配置
stable-diffusion-cpp:
  model: D:\tmp\sdc\v1-5-pruned-emaonly.ckpt
  command: D:\tmp\sdc\sd.exe
  options: {"sample_steps":2}
  