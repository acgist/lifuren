# HTTP监听
http-server:
  host: 0.0.0.0
  port: 8080
# 图片页面配置
image:
  client: stable-diffusion-cpp
  output: D:\tmp\data\image
  clients:
    - stable-diffusion-cpp
    - paint-cycle-gan
    - paint-style-gan
# 诗词页面配置
poetry:
  client: poetize-rnn
  clients:
    - poetize-rnn
# 诗词标记页面配置
mark:
  - path: D:\tmp\data\mark\poetry
# RAG
rag:
  id: 0
  # elasticsearch
  type: elasticsearch
  size: 4
  # ollama|chinese-word-vectors
  embedding: ollama
# Embedding
embedding:
  # ollama|chinese-word-vectors
  type: ollama
# Ollama配置
# https://github.com/ollama/ollama/blob/main/docs/api.md
ollama:
  api: http://192.168.8.228:11434
  username: 
  password: 
  # NONE|Basic|Token
  auth-type: NONE
  embedding:
    path: /api/embed
    model: quentinz/bge-large-zh-v1.5
    options: {}
# ElasticSearch配置
elasticsearch:
  api: http://192.168.8.183:9200
  username: elastic
  password: elastic
  # NONE|Basic|Token
  auth-type: Basic
# chinese-word-vectors配置
chinese-word-vectors:
  path: D:\tmp\Chinese-Word-Vectors\sgns.sikuquanshu.word
# poetize-rnn配置
poetize-rnn:
  model: D:\tmp\data\poetry.model
# paint-cycle-gan配置
paint-cycle-gan:
  model: D:\tmp\data\paint-cycle-gan.model
# paint-style-gan配置
paint-style-gan:
  model: D:\tmp\data\paint-style-gan.model
# stable-diffusion-cpp配置
stable-diffusion-cpp:
  model: D:\tmp\sdc\v1-5-pruned-emaonly.ckpt
  command: D:\tmp\sdc\sd.exe
  options: {"sample_steps":2}
  