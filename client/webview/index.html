<!DOCTYPE HTML>
<html>

<head>
  <title>李夫人</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <meta name="keywords" content="李夫人" />
  <meta name="description" content="李夫人" />

  <link rel="stylesheet" href="./style.css" />
  <script type="text/javascript" src="./score.js"></script>
  <script type="text/javascript" src="./jianpu.js"></script>
  <script type="text/javascript" src="./d3.min.js"></script>
  <script type="text/javascript" src="./fxp.min.js"></script>
  <script type="text/javascript" src="./jspdf.umd.min.js"></script>
  <script type="text/javascript" src="./svg2pdf.umd.min.js"></script>
  <script type="text/javascript" src="./opensheetmusicdisplay.min.js"></script>
</head>

<body>
  <div class="operation">
    <a class="hvr-radial-in" id="operation"    title="操作"><span class="icon-list"            ></span></a>
    <a class="hvr-radial-in" id="open_score"   title="打开"><span class="icon-folder-open"     ></span></a>
    <a class="hvr-radial-in" id="play_score"   title="演奏"><span class="icon-play3"           ></span></a>
    <a class="hvr-radial-in" id="rule_score"   title="指法"><span class="icon-music"           ></span></a>
    <a class="hvr-radial-in" id="staff_jianpu" title="转换"><span class="icon-equalizer"       ></span></a>
    <a class="hvr-radial-in" id="plus_score"   title="升调"><span class="icon-arrow-up-right"  ></span></a>
    <a class="hvr-radial-in" id="fall_score"   title="降调"><span class="icon-arrow-down-right"></span></a>
    <a class="hvr-radial-in" id="save_pdf"     title="文档"><span class="icon-files-empty"     ></span></a>
    <a class="hvr-radial-in" id="save_img"     title="图片"><span class="icon-images"          ></span></a>
    <a class="hvr-radial-in" id="zoom_in"      title="放大"><span class="icon-zoom-in"         ></span></a>
    <a class="hvr-radial-in" id="zoom_out"     title="缩小"><span class="icon-zoom-out"        ></span></a>
    <a class="hvr-radial-in" id="zoom_reset"   title="重置"><span class="icon-spinner11"       ></span></a>
  </div>
  <div id="staff_container"  class="container"></div>
  <div id="jianpu_container" class="container"><svg></svg></div>
  <script type="text/javascript">
    const music_xml = `<?xml version="1.0" encoding="UTF-16"?>
    <score-partwise version="3.0">
      <work>
        <work-number>K. 080</work-number>
        <work-title>Lifuren Demo (Version. 1.0.0)</work-title>
      </work>
      <part-list>
        <score-part id="P1">
          <part-name>Piano</part-name>
        </score-part>
      </part-list>
      <part id="P1">
        <measure implicit="yes" number="0">
          <attributes>
            <divisions>4</divisions>
            <key>
              <fifths>0</fifths>
              <mode>major</mode>
            </key>
            <time>
              <beats>4</beats>
              <beat-type>4</beat-type>
            </time>
          </attributes>
          <note>
            <rest measure="yes" />
            <voice>1</voice>
            <duration>4</duration>
          </note>
        </measure>
        <measure number="1" width="125">
          <note>
            <pitch>
              <step>G</step>
              <octave>4</octave>
            </pitch>
            <type>whole</type>
            <voice>1</voice>
            <duration>4</duration>
          </note>
        </measure>
      </part>
    </score-partwise>`;
    init_lifuren(music_xml);
  </script>
</body>

</html>
