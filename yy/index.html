<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>李夫人</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-eval' 'unsafe-inline';" />
  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./node_modules/element-plus/dist/index.css" />
  <script src="./node_modules/vue/dist/vue.global.prod.js"></script>
  <script src="./node_modules/element-plus/dist/index.full.min.js"></script>
</head>

<body>
  <div id="app">
    <el-button>{{ message }}</el-button>
  </div>
  <script>
    const lifuren = {
      data() {
        return {
          message: "李夫人",
        };
      },
    };
    const app = Vue.createApp(lifuren);
    app.use(ElementPlus);
    app.mount("#app");
  </script>
</body>

</html>
